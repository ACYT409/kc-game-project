 <!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner Life Sim</title>
</head>
 <div id="message-board">Welcome to Life Simulator!</div>
<h1>Life Simulator</h1>
    <div class="header">

      <div>💰 RM <span id="money-text">200</span></div>
        <div>💼 Job: <span id="job-text">None</span></div>
        <div>🍔 Hunger: <span id="hunger-text">100</span>%</div>
              
    </div>
    <div class="container">

    <body>
   <div class="box">
            <h2>💼 Find a Job</h2>
            <p>Earn money every second.</p>
            <button class="btn-job" onclick="takeJob('Dishwasher', 5)">Dishwasher (RM 5/sec)</button>
            <button class="btn-job" onclick="takeJob('Food Delivery', 15)">Food Delivery (RM 15/sec)</button>
            <button class="btn-job" onclick="takeJob('Office Worker', 40)">Office Worker (RM 40/sec)</button>
        </div>
   <div class="box">
    <h2> 🍔 Food Section</h2>
    <p>Eat to replenish Hunger</p>
    <button class="btn-food" onclick="eatFood('Roti Canai',5,20)">Roti Canai (Rm5)  [20 Hunger]</button>
    <button class="btn-food" onclick="eatFood('Burger',5,20)">Burger (Rm15)  [40 Hunger]</button>
    <button class="btn-food" onclick="eatFood('Crackers',5,20)">Crackers (Rm1)  [3 Hunger]</button>
  
  <div class="box">
            <h2>🏢 Investments</h2>
            <p>Passive Income: RM <span id="passive-text">0</span>/sec</p>
            <button onclick="buyInvestment('Vending Machine', 500, 10)">Buy Vending Machine (RM 500)</button>
            <button onclick="buyInvestment('Small Shop', 5000, 150)">Buy Small Shop (RM 5,000)</button>
        </div>

    </div>

    <script>
     
     let money = 200;
let hunger = 100;
let salary = 0;          
let passiveIncome = 0;    
let jobName = "Unemployed";

function takeJob(newJobName, newSalary) {
  jobName = newJobName;
  salary = newSalary;
  showMessage("You are now working as a " + jobName);
  updateScreen();
}

function eatFood(foodName, cost, fillAmount) {
  if (money >= cost) {
    money -= cost;
    hunger += fillAmount;

    if (hunger > 100) hunger = 100;

    showMessage("You ate " + foodName);
  } else {
    showMessage("Not enough money to buy " + foodName);
  }
}

function buyInvestment(itemName, cost, extraIncome) {
  if (money >= cost) {
    money -= cost;
    passiveIncome += extraIncome;
    showMessage("You bought a " + itemName);
  } else {
    showMessage("You need RM " + cost);
  }
  updateScreen();
}

function showMessage(text) {
  document.getElementById("message-board").innerText = text;
}

function updateScreen() {
  document.getElementById("money-text").innerText = money;
  document.getElementById("hunger-text").innerText = hunger;
  document.getElementById("job-text").innerText = jobName;
  document.getElementById("passive-text").innerText = passiveIncome;
}

setInterval(function () {
  money += salary + passiveIncome;
  hunger -= 3;

  if (hunger <= 0) {
    alert("Game Over! You starved. You had RM " + money);
    location.reload();
  }

  let randomNumber = Math.random();

  if (randomNumber < 0.001) {
    money += 500000;
    showMessage("🎉 Lottery! +RM500000");

  } else if (randomNumber < 0.01) {
    money += 1000;
    showMessage("👨‍👩‍👧 Parents gave you RM1000");

  } else if (randomNumber < 0.08) {
    money += 200;
    showMessage("💰 Found RM200");

  } else if (randomNumber < 0.10) {
    money -= 10;
    showMessage("💸 Dropped RM10");

  } else if (randomNumber < 0.15) {
    money -= 300;
    showMessage("🧾 Paid bill (-RM300)");
  }

  if (money < 0) money = 0;

  updateScreen();
}, 1000);
    

    </script>
</body>
</html>
