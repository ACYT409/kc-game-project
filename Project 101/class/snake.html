<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fcf6d7;
            color: black;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .stats {
            margin-bottom: 10px;
            font-size: 24px;
        }
        .controls {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="stats">Score: <span id="score">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <div class="controls">Use Arrow Keys to Move</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        
        // Snake body (array of coordinates)
        let snake = [
            {x: 10, y: 10}, 
            {x: 10, y: 11}, 
            {x: 10, y: 12}
        ];

        // Food position
        let foodX = 5;
        let foodY = 5;

        // Prevent rapid key presses from reversing direction instantly
        let changingDirection = false;

        document.addEventListener("keydown", changeDirection);

        function main() {
            if (didGameEnd()) {
                alert("Game Over! Your score: " + score);
                resetGame();
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // Speed: 100ms per frame
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

       function drawSnake() {
            snake.forEach((part, index) => {
                // Determine color: Head is lighter green, body is darker green
                ctx.fillStyle = (index === 0) ? "#4CAF50" : "#2E7D32"; 
                
                // Calculate the center point of the tile
                const centerX = part.x * gridSize + (gridSize / 2);
                const centerY = part.y * gridSize + (gridSize / 2);
                
                // Calculate the radius (slight smaller than half grid to create a gap)
                const radius = (gridSize / 2) - 1; 

                // Start drawing a path (necessary for circles/arcs)
                ctx.beginPath();
                
                // Draw a full circle (0 to 2*PI radians)
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                
                // Fill the circle with the chosen color
                ctx.fill();
                
                // Optional: Draw a black outline (like original square snake)
                // ctx.strokeStyle = "#000";
                // ctx.stroke();
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Don't move if game hasn't started (no direction set)
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            // Check if snake ate food
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;

            // Hit walls
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            // Hit self
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            
            // Make sure food doesn't spawn on snake body
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == foodX && part.y == foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1; dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0; dy = -1;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1; dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0; dy = 1;
            }
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = score;
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0;
            dy = 0;
            createFood();
        }

        // Initialize game
        createFood();
        main();
    </script>
</body>
</html>
