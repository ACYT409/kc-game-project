<!DOCTYPE html>
<html>
<head>
  <title>Selection Panel</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #e8af64;
      color: #453d37;
      text-align: center;
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    }

    h1 {
      padding: 30px;
      font-size: 48px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 250px;
      height: 150px;
      background: #a16a45;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }


    .card:hover {
      background: #8c6043;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>Choose a Game</h1>

  <div class="container">

    <a href="#news" class="card">tbd</a>

    <a href="#gallery" class="card">tbd</a>

    <a href="#contact" class="card">tbd</a>

<a href="class/2048.html" class="card">2048</a>

  </div>

</body>
</html>
